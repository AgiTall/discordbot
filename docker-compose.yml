version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pchevbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pchevbot
      POSTGRES_PASSWORD: pchevbot_secret
      POSTGRES_DB: pchevbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pchevbot"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    container_name: discord-bot-container
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override localhost with postgres service name for Docker network
      - DATABASE_URL=postgresql+asyncpg://pchevbot:pchevbot_secret@postgres:5432/pchevbot
    ports:
      - "10000:10000"

volumes:
  pgdata:
